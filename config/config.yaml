pipeline:
  log_level: INFO
  output_dir: output/
  db_path: output/triage.db
  dry_run: false

enrichment:
  virustotal:
    enabled: true
    api_key_env: VT_API_KEY
    rate_limit_per_min: 4
    timeout_seconds: 10
  shodan:
    enabled: true
    api_key_env: SHODAN_API_KEY
    rate_limit_per_min: 1
    timeout_seconds: 10
  cache:
    enabled: true
    ttl_seconds: 3600
    cache_dir: output/.cache

scoring:
  weights:
    severity: 0.25
    vt_malicious_ratio: 0.20
    shodan_exposure: 0.15
    asset_criticality: 0.15
    recency: 0.15
    prior_sightings: 0.10
  baseline_lookback_days: 7
  recency:
    half_life_hours: 6.0
    floor: 0.10
  severity_map:
    critical: 1.0
    high: 0.75
    medium: 0.45
    low: 0.20
  confidence_thresholds:
    high_confidence: 0.80
    medium_confidence: 0.50
  output_priority_labels:
    - INVESTIGATE_NOW
    - INVESTIGATE_SOON
    - MONITOR
    - LOW_PRIORITY

correlation:
  window_minutes: 15
  min_alerts_per_incident: 1

reporting:
  highlight_top_n: 5

sources:
  splunk:
    host: localhost
    port: 8089
    username_env: SPLUNK_USERNAME
    password_env: SPLUNK_PASSWORD
    search: "search index=alerts earliest=-1h | head 500"
    verify_ssl: false
    timeout_seconds: 30
  elastic:
    host: https://localhost:9200
    api_key_env: ELASTIC_API_KEY
    username_env: ELASTIC_USERNAME
    password_env: ELASTIC_PASSWORD
    index: ".alerts-security.alerts-default"
    lookback_minutes: 60
    max_alerts: 500
    verify_ssl: false
