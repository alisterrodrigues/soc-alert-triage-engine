# Maps alert category and rule_id prefix to MITRE ATT&CK tactic and technique ID.
# rule_id_prefix takes priority over category when both match.
# Tactic names use underscores, matching the MITRE Enterprise ATT&CK framework.

categories:
  malware:
    tactic: EXECUTION
    technique: T1059
    technique_name: "Command and Scripting Interpreter"
  phishing:
    tactic: INITIAL_ACCESS
    technique: T1566
    technique_name: "Phishing"
  lateral_movement:
    tactic: LATERAL_MOVEMENT
    technique: T1021
    technique_name: "Remote Services"
  c2:
    tactic: COMMAND_AND_CONTROL
    technique: T1071
    technique_name: "Application Layer Protocol"
  data_exfil:
    tactic: EXFILTRATION
    technique: T1041
    technique_name: "Exfiltration Over C2 Channel"
  recon:
    tactic: RECONNAISSANCE
    technique: T1595
    technique_name: "Active Scanning"
  other:
    tactic: null
    technique: null
    technique_name: null

